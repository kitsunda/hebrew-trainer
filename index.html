<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Тренажёр иврита</title>
<meta name="description" content="Личный тренажёр иврита с интервальными повторениями">
<meta name="theme-color" content="#f4ead5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Иврит">
<meta property="og:type" content="website">
<meta property="og:title" content="Тренажёр иврита">
<meta property="og:description" content="Личный тренажёр слов с интервальными повторениями">
<meta property="og:image" content="https://kitsunda.github.io/hebrew-trainer/icons/icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<style>
:root{
  --color-bg:#f4ead5;
  --color-text:#181817;
  --color-text-muted:rgba(23,23,20,.6);
  --color-text-faint:rgba(23,23,20,.4);
  --color-line:rgba(20,20,18,.12);
  --color-surface:rgba(255,255,255,.5);
  --color-surface-solid:#fbf5e7;

  --color-orange:#f36a32;
  --color-yellow:#f4c62f;
  --color-blue:#328fc5;
  --color-lilac:#a3a0d8;
  --color-green:#5c9b75;
  --color-coral:#e98578;
  --color-pink:#dca6b8;
  --color-mint:#7eb9a7;

  --good:#5c9b75;
  --bad:#b6503f;

  --radius-sm:14px;
  --radius-md:22px;
  --radius-lg:30px;
  --radius-pill:999px;

  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px;
  --space-6:24px; --space-8:32px; --space-10:40px; --space-12:48px; --space-16:64px;

  --ease-out: cubic-bezier(0.22,1,0.36,1);
  --font-sans: -apple-system,"Inter","Manrope","Helvetica Neue","Segoe UI",Arial,sans-serif;
  --font-mono: ui-monospace,"SF Mono","IBM Plex Mono","Menlo","Consolas",monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--color-bg);
  color:var(--color-text);
  font-family:var(--font-sans);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
/* очень слабое зерно поверх фона — CSS-only, без изображений */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.025; mix-blend-mode:multiply;
  background-image:
    radial-gradient(circle at 15% 20%, #000 0.4px, transparent 0.4px),
    radial-gradient(circle at 65% 75%, #000 0.4px, transparent 0.4px),
    radial-gradient(circle at 85% 35%, #000 0.4px, transparent 0.4px);
  background-size: 3px 3px, 4px 4px, 5px 5px;
}
.font-hebrew{font-family:"Arial Hebrew","New Peninim MT","Rubik","Times New Roman","Noto Sans Hebrew",sans-serif; direction:rtl; unicode-bidi:isolate;}
.mono-label{font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.08em; font-weight:500;}

button{font-family:inherit;}
:focus-visible{outline:2px solid var(--color-text); outline-offset:5px;}

.wrap{
  max-width:460px; margin:0 auto; position:relative; z-index:1;
  padding:calc(24px + env(safe-area-inset-top)) var(--space-5) calc(var(--space-12) + env(safe-area-inset-bottom));
}
.profile-gate{min-height:100vh; display:grid; place-items:center; padding:24px; position:relative; z-index:2;}
.profile-gate-inner{width:min(100%,360px); text-align:center; animation:riseIn .5s var(--ease-out) both;}
.profile-gate .eyebrow{margin:0 0 10px;}
.profile-gate h1{font-size:28px; font-weight:500; letter-spacing:-.03em; margin:0 0 8px;}
.profile-gate p{font-size:13px; color:var(--color-text-muted); margin:0 0 28px;}
.profile-choices{display:flex; gap:12px; justify-content:center;}
.profile-choice{flex:1; min-height:56px; border:1px solid var(--color-line); border-radius:18px; background:transparent; color:var(--color-text); font-size:15px; font-weight:550; cursor:pointer; transition:transform .2s var(--ease-out), background .2s ease;}
.profile-choice:hover,.profile-choice:focus-visible{transform:translateY(-2px); background:rgba(255,255,255,.42);}
.profile-choice:active{transform:scale(.97);}

/* ---------- MinimalHeader ---------- */
header.top{display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-5); animation:riseIn .5s var(--ease-out) both;}
header.top .eyebrow{
  font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-muted);
  font-weight:600; margin:0; font-family:var(--font-mono);
}
header.top h1{
  font-family:var(--font-sans); font-size:20px; margin:2px 0 0; font-weight:520; letter-spacing:-.01em; color:var(--color-text);
}
.profile-switch{border:none; background:none; color:var(--color-text-muted); font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; text-transform:uppercase; cursor:pointer; padding:8px 0 8px 10px;}
.profile-switch:hover{color:var(--color-text);}

/* ---------- StatsOverview ---------- */
.stats-hero{margin-bottom:var(--space-8); animation:riseIn .55s .08s var(--ease-out) both;}
.stats-top-row{display:flex; align-items:flex-end; justify-content:space-between; gap:var(--space-4);}
.stats-overview{display:flex; align-items:flex-end; gap:var(--space-5);}
.stat-main{display:flex; flex-direction:column; gap:5px;}
.stat-main-num{font-size:clamp(48px,15vw,76px); font-weight:430; line-height:.86; letter-spacing:-.055em; font-variant-numeric:tabular-nums;}
.stat-main-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.035em; color:var(--color-text-muted); text-transform:uppercase; font-weight:480; line-height:1.35; max-width:128px;}
.stat-main-label strong{font-weight:600; color:var(--color-text);}
.stat-streak{display:flex; flex-direction:column; gap:3px; padding-bottom:2px;}
.stat-streak-num{font-size:clamp(26px,8vw,38px); font-weight:450; line-height:.95; letter-spacing:-.04em; font-variant-numeric:tabular-nums;}
.stat-streak-label{font-family:var(--font-mono); font-size:10px; letter-spacing:.045em; color:var(--color-text-muted); text-transform:uppercase; white-space:nowrap;}

/* ---------- section titles ---------- */
.section-title{
  font-size:14px; font-weight:600; color:var(--color-text); margin:0 0 var(--space-1);
  letter-spacing:-.005em;
}
.section-sub{font-size:13px; color:var(--color-text-muted); margin:0 0 var(--space-5); font-weight:500;}
.section-block{margin-bottom:var(--space-10);}
#setup{display:flex; flex-direction:column;}
.data-actions{display:flex; gap:var(--space-5); align-items:center; flex-wrap:wrap;}
.data-action{
  border:none; background:none; padding:0; color:var(--color-text-muted); cursor:pointer;
  font-size:13px; font-weight:600; text-decoration:underline; text-underline-offset:3px;
}
.data-action:hover{color:var(--color-text);}
.data-note{font-size:12px; line-height:1.4; color:var(--color-text-muted); margin:var(--space-3) 0 0;}

/* ---------- TopicMap / TopicBlob ---------- */
.topic-map{display:flex; flex-direction:column; gap:var(--space-2); animation:riseIn .55s .2s var(--ease-out) both;}
.topic-blob{
  position:relative; isolation:isolate; border:none; background:none; cursor:pointer;
  display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
  width:100%;
  min-height:52px; padding:var(--space-3) var(--space-5); text-align:left;
  transition:transform .2s var(--ease-out), filter .25s ease, opacity .25s ease;
  opacity:calc(.78 + var(--topic-progress, 0) * .22);
  filter:saturate(calc(.72 + var(--topic-progress, 0) * .75));
  animation:topicIn .55s var(--topic-delay, 0s) var(--ease-out) both;
}
.topic-blob::before{
  content:''; position:absolute; z-index:-1; pointer-events:none;
  left:0; top:50%; transform:translateY(-50%);
  width:var(--blob-size); height:calc(var(--blob-size) * .74);
  border-radius:var(--blob-radius, 45% 55% 60% 40% / 55% 45% 55% 45%);
  background:var(--blob-background, radial-gradient(circle at 38% 32%, var(--blob-color) 0%, var(--blob-color) 42%, transparent 74%));
  filter:blur(8px);
  opacity:calc(.82 + var(--topic-progress, 0) * .18);
  transition:transform .25s var(--ease-out), filter .25s ease, opacity .25s ease;
  animation:cloudDrift var(--topic-drift, 8s) ease-in-out var(--topic-delay, 0s) infinite alternate;
}
.topic-blob.on{opacity:calc(.88 + var(--topic-progress, 0) * .12);}
.topic-blob:not(.on){opacity:.72; filter:saturate(.9);}
.topic-blob:hover,.topic-blob:focus-visible{transform:translate(2px,-2px);}
.topic-blob:hover::before,.topic-blob:focus-visible::before{transform:translateY(-50%) scale(1.045); filter:blur(10px); opacity:1;}
.topic-blob:active{transform:translate(2px,-1px) scale(.985);}
.topic-blob:nth-child(3n+2){align-self:stretch; align-items:flex-end; text-align:right;}
.topic-blob:nth-child(3n+2)::before{left:auto; right:0;}
.topic-blob:nth-child(4n+3){margin-top:-4px;}
.topic-blob:nth-child(5n+1){margin-top:6px;}
.topic-name{
  font-family:var(--font-mono); font-size:13px; font-weight:480; letter-spacing:.038em; text-transform:uppercase;
  color:var(--color-text); line-height:1.3;
}
.topic-meta{font-size:11.5px; color:var(--color-text-muted); margin-top:1px; font-weight:500; font-variant-numeric:tabular-nums;}

@keyframes riseIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes topicIn{from{opacity:0;transform:translateY(8px);}to{opacity:var(--topic-final-opacity,1);transform:translateY(0);}}
@keyframes cloudDrift{from{margin-top:-1px;}to{margin-top:2px;}}

/* ---------- top action ---------- */
.start-col{display:flex; flex-direction:column; align-items:center; gap:var(--space-1); flex:none; padding-bottom:1px;}
.btn-primary{
  width:48px; height:48px; display:grid; place-items:center; background:transparent; color:var(--color-text);
  border:1px solid rgba(24,24,23,.36); border-radius:50%; padding:0; font-size:23px; line-height:1; cursor:pointer;
  transition:transform .2s var(--ease-out), background .2s ease, color .2s ease; white-space:nowrap;
}
.btn-primary:hover,.btn-primary:focus-visible{transform:translateY(-2px); background:var(--color-text); color:var(--color-bg);}
.btn-primary:active{transform:translateY(0) scale(.94);}
.btn-primary:disabled{opacity:.35; cursor:not-allowed; transform:none;}
.start-label{font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; color:var(--color-text-muted); text-transform:uppercase;}
.hint-empty{font-size:10px; color:var(--color-text-muted); font-weight:500; text-align:center; max-width:100px;}

/* ---------- SESSION ---------- */
#session{display:none; flex-direction:column; gap:var(--space-8);}
.session-top{display:flex; align-items:center; justify-content:space-between; gap:var(--space-4);}
.session-progress{flex:1; height:2px; background:var(--color-line); overflow:hidden;}
.session-progress-fill{height:100%; background:var(--color-text); transition:width .3s var(--ease-out);}
.exit-btn{background:none;border:none;color:var(--color-text-muted);font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap;}
.exit-btn:hover{color:var(--color-text);}

.stage{
  position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:380px; padding:var(--space-8) var(--space-4); text-align:center;
  transition:transform .18s var(--ease-out);
}
.stage::before{
  content:''; position:absolute; z-index:-1; pointer-events:none; left:50%; top:42%; transform:translate(-50%,-50%);
  width:280px; height:220px; border-radius:48% 52% 58% 42% / 55% 45% 58% 42%;
  background:radial-gradient(circle at 45% 40%, var(--stage-color, var(--color-mint)) 0%, var(--stage-color, var(--color-mint)) 35%, transparent 70%);
  filter:blur(30px); opacity:.5;
}
.stage.correct{animation:calmpulse .3s var(--ease-out);}
.stage.wrong{animation:calmshake .3s var(--ease-out);}
@keyframes calmpulse{0%{transform:scale(1);}50%{transform:scale(1.01);}100%{transform:scale(1);}}
@keyframes calmshake{0%,100%{transform:translateX(0);}33%{transform:translateX(-4px);}66%{transform:translateX(4px);}}
@media (prefers-reduced-motion: reduce){
  .stage.correct,.stage.wrong{animation:none;}
  .topic-blob,.topic-blob::before,header.top,.stats-hero,.topic-map{animation:none !important;}
  *{transition-duration:.01ms !important; animation-duration:.01ms !important;}
}

.topic-tag{
  font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--color-text-muted); font-weight:550;
  margin-bottom:var(--space-6);
}

/* flashcard: fade reveal, no 3D flip */
.flip-zone{width:100%; max-width:420px; cursor:pointer; min-height:120px; display:flex; flex-direction:column; align-items:center;}
.card-back{opacity:0; transform:translateY(8px); transition:opacity .22s var(--ease-out), transform .22s var(--ease-out); width:100%;}
.flip-zone.revealed .card-back{opacity:1; transform:translateY(0);}
.flip-zone.revealed .card-front-hint{opacity:0; height:0; overflow:hidden;}
.hebrew-word{font-weight:520; text-align:center; line-height:1.25; white-space:normal; word-break:break-word; max-width:100%;}
.translit{font-size:14px; color:var(--color-text-muted); font-weight:500; margin-top:var(--space-2);}
.russian-word{font-size:22px; font-weight:520; font-family:var(--font-sans); text-align:center; line-height:1.3; white-space:normal; word-break:break-word; max-width:100%; margin-top:var(--space-4); padding-top:var(--space-4); border-top:1px solid var(--color-line);}
.flip-hint{font-size:12px; color:var(--color-text-faint); font-weight:500; margin-top:var(--space-4);}

.know-row{display:flex; align-items:center; justify-content:center; gap:var(--space-8); margin-top:var(--space-6); width:100%;}
.know-btn{
  padding:12px 8px; font-size:14.5px; font-weight:600; cursor:pointer; border:none; background:none;
  transition:opacity .15s ease; min-width:96px;
}
.know-btn:hover{opacity:.7;}
.know-btn.no{color:var(--bad);}
.know-btn.yes{color:var(--good);}

/* multiple choice */
.mc-prompt{font-weight:520; margin-bottom:var(--space-8); text-align:center; line-height:1.3; max-width:340px;}
.mc-list{display:flex; flex-direction:column; gap:var(--space-2); width:100%; max-width:360px;}
.mc-opt{
  padding:14px 16px; border-radius:var(--radius-md); border:1px solid var(--color-line); background:var(--color-surface);
  font-size:14.5px; font-weight:550; cursor:pointer; text-align:left; transition:all .15s var(--ease-out);
  display:flex; align-items:center; justify-content:space-between; gap:var(--space-2);
}
.mc-opt:hover{border-color:var(--color-text-faint);}
.mc-opt .mark{width:16px; height:16px; flex:none; opacity:0;}
.mc-opt.correct{background:rgba(92,155,117,.16); border-color:var(--good); color:var(--good);}
.mc-opt.correct .mark{opacity:1;}
.mc-opt.wrong{background:rgba(182,80,63,.14); border-color:var(--bad); color:var(--bad);}
.mc-opt.wrong .mark{opacity:1;}
.mc-opt[disabled]{cursor:default;}

/* typing mode */
.type-prompt{font-size:24px; font-weight:520; margin-bottom:var(--space-2); text-align:center; font-family:inherit;}
.type-sub{font-size:12.5px; color:var(--color-text-muted); margin-bottom:var(--space-6); font-weight:500;}
.type-input{
  width:100%; max-width:320px; font-size:18px; padding:12px 4px; border-radius:0;
  border:none; border-bottom:1px solid var(--color-line); background:transparent; color:var(--color-text); text-align:center;
  font-family:inherit; font-weight:520;
}
.type-input:focus{outline:none; border-bottom-color:var(--color-text);}
.type-input.correct{border-bottom-color:var(--good); color:var(--good);}
.type-input.wrong{border-bottom-color:var(--bad); color:var(--bad);}
.type-actions{display:flex; align-items:center; gap:var(--space-6); margin-top:var(--space-6);}
.type-actions button{border:none; background:none; padding:0; font-size:13.5px; font-weight:600; cursor:pointer;}
.type-submit{color:var(--color-text);}
.type-reveal{color:var(--color-text-muted); text-decoration:underline; text-underline-offset:3px;}
.reveal-answer{margin-top:var(--space-5); font-size:13.5px; color:var(--color-text-muted); font-weight:500;}
.reveal-answer b{color:var(--color-text); font-family:inherit;}

/* context example + mnemonics */
.context-line{margin-top:var(--space-3); font-size:13px; color:var(--color-text-muted); font-weight:500; text-align:center; line-height:1.4;}
.context-line .context-sep{margin:0 6px; opacity:.5;}
.mnemonic-hint{
  margin-top:var(--space-2); font-size:13px; font-weight:500; color:var(--color-text); text-align:center;
  padding:0;
}
.mnemonic-prompt{
  margin-top:var(--space-5); text-align:center; max-width:320px;
}
.mnemonic-prompt p{margin:0 0 var(--space-2); font-size:12.5px; color:var(--color-text-muted); font-weight:500;}
.mnemonic-form{display:flex; gap:var(--space-2);}
.mnemonic-input{
  flex:1; border:none; border-bottom:1px solid var(--color-line); padding:6px 2px; font-size:13px;
  background:transparent; color:var(--color-text); font-family:inherit; font-weight:500;
}
.mnemonic-input:focus{outline:none; border-bottom-color:var(--color-text);}
.mnemonic-save{border:none; padding:6px 2px; font-size:12.5px; font-weight:600; background:none; color:var(--color-text); cursor:pointer; text-decoration:underline; text-underline-offset:3px;}

/* summary */
#summary{display:none; flex-direction:column; align-items:center; gap:var(--space-5); text-align:center; padding:var(--space-8) 0;}
#summary .summary-mark{width:40px;height:40px;}
#summary h2{font-family:inherit; font-size:28px; margin:0; font-weight:520;}
.summary-grid{display:flex; gap:var(--space-6); flex-wrap:wrap; justify-content:center;}
.summary-stat{display:flex; flex-direction:column; gap:1px;}
.summary-stat .n{font-size:22px; font-weight:600; font-variant-numeric:tabular-nums;}
.summary-stat .l{font-size:11px; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.05em; font-weight:550; font-family:var(--font-mono);}
.summary-actions{display:flex; align-items:center; gap:var(--space-5); margin-top:var(--space-2);}
.btn-ghost{
  background:none; border:none; color:var(--color-text-muted); padding:0;
  font-size:13.5px; font-weight:600; cursor:pointer; text-decoration:underline; text-underline-offset:3px;
}
.btn-ghost:hover{color:var(--color-text);}

/* toast queue */
#toast{
  position:fixed; top:calc(var(--space-5) + env(safe-area-inset-top)); left:50%; transform:translateX(-50%) translateY(-140%); z-index:50;
  padding:11px 20px; border:1px solid var(--color-line); color:var(--color-text); background:var(--color-surface-solid);
  border-radius:var(--radius-pill); font-weight:550; font-size:13.5px;
  transition:transform .4s var(--ease-out); display:flex; align-items:center; gap:8px;
  backdrop-filter:blur(10px);
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ---------- showcase: collection + achievements ---------- */
.showcase-scroll{display:flex; gap:var(--space-5); overflow-x:auto; padding:var(--space-4) 0 var(--space-2); margin:0 calc(var(--space-5) * -1); padding-left:var(--space-5); padding-right:var(--space-5); scrollbar-width:none; animation:riseIn .55s .28s var(--ease-out) both;}
.showcase-scroll::-webkit-scrollbar{display:none;}
.showcase-item{
  display:flex; flex-direction:column; align-items:center; gap:5px; text-align:center; flex:none;
  width:88px; min-height:104px; background:transparent; border-radius:0; padding:4px 0;
  transition:opacity .25s ease, transform .25s var(--ease-out), filter .25s ease;
}
.showcase-item.locked{opacity:.42; filter:grayscale(.65); transform:scale(.9);}
.showcase-item.unlocked{opacity:1; transform:scale(1.05);}
.showcase-item.just-unlocked{animation:bloomIn .75s var(--ease-out) both;}
.showcase-icon{width:54px;height:62px; transition:transform .5s var(--ease-out), filter .5s ease;}
.showcase-item.locked .showcase-icon{width:42px;height:50px; background-image:none; background-color:transparent; border-radius:0;}
.showcase-item.locked .showcase-icon svg{opacity:.35;}
.showcase-icon{background-image:url('icons/achievement-flowers.png'); background-size:1000% 500%; background-repeat:no-repeat; background-position:var(--flower-x) var(--flower-y); border-radius:12px; overflow:hidden;}
.showcase-icon svg{width:100%;height:100%;display:block;}
.showcase-req{font-size:10px; color:var(--color-text-muted); font-weight:500; font-variant-numeric:tabular-nums; font-family:var(--font-mono);}
.garden-next{display:flex; align-items:center; gap:var(--space-3); margin-top:var(--space-2); color:var(--color-text-muted); font-size:12px;}
.garden-next-stem{width:46px; height:2px; background:linear-gradient(90deg,var(--color-green) var(--next-progress,0%), var(--color-line) var(--next-progress,0%)); border-radius:999px;}
@keyframes bloomIn{0%{opacity:.35;transform:scale(.78);}55%{opacity:1;transform:scale(1.13);}100%{opacity:1;transform:scale(1.05);}}

@media (max-width:380px){
  .stat-simple-num{font-size:clamp(34px,13vw,44px);}
  .know-row{gap:var(--space-6);}
}
</style>
</head>
<body>

<div id="toast"></div>

<section class="profile-gate" id="profileGate" aria-labelledby="profileTitle">

    <h1 id="profileTitle">Кто играет?</h1>

<div class="wrap" id="appWrap">
  <header class="top">
    <div>
      <h1>Тренажёр слов</h1>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="vocab.js"></script>
<script src="lenya-vocab.js"></script>
<script>
  if (localStorage.getItem('hebrewTrainer_activeProfile') === 'lenya') {

  }

<script>

const TOPIC_GROUPS = [
  {key:'verbs', label:'Глаголы'},
  {key:'grammar', label:'Грамматика'},
  {key:'everyday', label:'Повседневное'},
  {key:'phrases', label:'Фразы'},
  {key:'food', label:'Еда'},
  {key:'work', label:'Работа'},
  {key:'health', label:'Здоровье'},
  {key:'transport', label:'Передвижение'},
  {key:'idioms', label:'Идиомы и сленг'},
  {key:'songs', label:'Песни'},
];
function hebrewFontSize(text){
  const len = (text||'').length;
  if(len<=10) return 'clamp(30px,6vw,42px)';
  if(len<=20) return 'clamp(24px,5vw,34px)';
  if(len<=36) return 'clamp(19px,4vw,27px)';
  if(len<=60) return 'clamp(16px,3.2vw,21px)';
  return 'clamp(14px,2.6vw,18px)';
}
function russianFontSize(text){
  const len = (text||'').length;
  if(len<=14) return '22px';
  if(len<=28) return '19px';
  if(len<=50) return '16.5px';
  return '14.5px';
}
function groupOf(topic, word){
  const t = (topic||'').toLowerCase();
  const text = `${word?.h||''} ${word?.r||''}`.toLowerCase();
  if(/песня|молитва|стих|текст песни|שיר|מילים לשיר/.test(`${t} ${text}`)) return 'songs';
  if(/идиом|сленг|ביטוי|סלנג|дословно|в контексте|что ты ко мне привязался|глупости/.test(`${t} ${text}`)) return 'idioms';
  if(/здоров|тело|врач|лекар|боль|привив|болез|רופא|בריאות|חיסון|כאב/.test(`${t} ${text}`)) return 'health';
  if(/работ|банк|финанс|деньг|зарплат|должност|офис|клиент|целевая аудит|работа|עבודה|בנק|כסף|משכורת|תפקיד/.test(`${t} ${text}`)) return 'work';
  if(/еда|покуп|ресторан|завтрак|обед|ужин|мяс|хлеб|сыр|вода|напит|готов|жар|кухн|магазин|רесторан|אוכל|קניות|לחם|בשר|מים|חנות/.test(`${t} ${text}`)) return 'food';
  if(/переезд|переезж|дорог|машин|автобус|поезд|самол|такси|улиц|город|пляж|путешеств|гулять|возвращ|приех|приход|בוא|חזור|נסיעה|אוטובוס|רכבת|עיר|חוף/.test(`${t} ${text}`)) return 'transport';
  if(/грамматик|предлог|местоим|суффикс|связк|пассив|степен|время|спряжен|конструкц|биньян|модаль|עברית דקדוק/.test(`${t} ${text}`)) return 'grammar';
  if(/глагол|инфинитив|делать|хотеть|мочь|должен|купить|пить|работать|принос|возвращ|строить|говорить|смеять|готовить|ל[א-ת]{2,}/.test(`${t} ${text}`)) return 'verbs';
  if(word?.k==='phrase' || word?.k==='sentence' || /^фразы$/.test(t)) return 'phrases';
  return 'everyday';
}

VOCAB.forEach((w,i)=>{
  w.id = i;
  w.group = groupOf(w.g, w);
  // Длинные предложения остаются в базе как контекст для карточек,
  // но не превращаются в отдельные пункты тренировки.
  w.isExample = w.k === 'sentence' && ((w.h||'').length > 28 || (w.r||'').length > 46);
});

/* Контекст усиливает запоминание почти так же сильно, как активное вспоминание
   (Broek et al., 2022) — при повторе показываем фразу/предложение, где то же
   слово встречается на иврите, если такая нашлась в датасете. */
const CONTEXT_CANDIDATES = VOCAB.filter(w=>w.k!=='word' && w.h.length>=6);
VOCAB.forEach(w=>{
  w.ctx = null;
  if(w.k==='word' && w.h.length>=2){
    const match = CONTEXT_CANDIDATES.find(p=>p.h!==w.h && p.h.includes(w.h));
    if(match) w.ctx = match.id;
  }
});

const GROUP_COUNTS = {};
VOCAB.forEach(w=>{ if(!w.isExample) GROUP_COUNTS[w.group] = (GROUP_COUNTS[w.group]||0)+1; });

const STORE_PREFIX = 'hebrewTrainer_v1_';
const PROFILE_NAMES = {nastya:'Настя', lenya:'Лёня'};
const SUPABASE_URL = 'https://uplxewnckhvaoarqmutp.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_unv0cdILHE0EP_OPyYfiiw_efsGWPS2';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
let activeProfile = localStorage.getItem('hebrewTrainer_activeProfile');
let cloudSaveTimer = null;
function localStoreKey(){ return `${STORE_PREFIX}${activeProfile||'nastya'}`; }
const DEFAULT_STATE = {
  boxes:{}, xp:0, streak:0, bestStreak:0, dayStreak:0, lastDate:null, selectedTopics:null,
  lastGoalDate:null, shields:1, achievements:{}, announcedCollectibles:[], totalCorrectEver:0,
  due:{}, wrongStreaks:{}, mnemonics:{}, vocabVersion:0
};
function normalizeState(candidate){
  if(!candidate || typeof candidate !== 'object' || Array.isArray(candidate)) throw new Error('Некорректный формат прогресса');
  return {
    ...DEFAULT_STATE,
    ...candidate,
    boxes:{...(candidate.boxes||{})},
    achievements:{...(candidate.achievements||{})},
    announcedCollectibles:Array.isArray(candidate.announcedCollectibles) ? candidate.announcedCollectibles : [],
    due:{...(candidate.due||{})},
    wrongStreaks:{...(candidate.wrongStreaks||{})},
    mnemonics:{...(candidate.mnemonics||{})}
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(localStoreKey()) || (activeProfile==='nastya' ? localStorage.getItem('hebrewTrainer_v1') : null);
    if(raw) return normalizeState(JSON.parse(raw));
  }catch(e){}
  return normalizeState({});
}
let STATE = loadState();
function saveState(){
  localStorage.setItem(localStoreKey(), JSON.stringify(STATE));
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveStateToCloud, 500);
}
async function saveStateToCloud(){
  if(!activeProfile) return;
  const {error} = await supabaseClient.from('trainer_progress').upsert({profile_id:activeProfile, state:STATE, updated_at:new Date().toISOString()});
  if(error) console.error('Не удалось сохранить прогресс в облако', error);
}
async function loadStateFromCloud(){
  if(!activeProfile) return;
  const {data, error} = await supabaseClient.from('trainer_progress').select('state').eq('profile_id', activeProfile).maybeSingle();
  if(error){ console.error('Не удалось загрузить прогресс из облака', error); return; }
  if(data?.state){
    const needsLenyaReset = activeProfile === 'lenya' && data.state.vocabVersion !== 1;
    STATE = needsLenyaReset ? normalizeState({vocabVersion:1}) : normalizeState(data.state);
    if(needsLenyaReset) await saveStateToCloud();
    localStorage.setItem(localStoreKey(), JSON.stringify(STATE));
    selectedTopics = new Set(STATE.selectedTopics || TOPIC_GROUPS.filter(g=>GROUP_COUNTS[g.key]).map(g=>g.key));
    renderTopics(); renderPoolHint(); renderStats(); renderGarden();
  } else {
    await saveStateToCloud();
  }
}

function exportProgress(){
  const payload = { app:'hebrew-trainer', version:1, exportedAt:new Date().toISOString(), state:STATE };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `hebrew-trainer-progress-${todayStr()}.json`;
  link.click();
  URL.revokeObjectURL(url);
  showToast('Прогресс скачан');
}
async function importProgress(file){
  try{
    const parsed = JSON.parse(await file.text());
    const candidate = parsed && parsed.app==='hebrew-trainer' ? parsed.state : parsed;
    STATE = normalizeState(candidate);
    saveState();
    selectedTopics = new Set(STATE.selectedTopics || TOPIC_GROUPS.filter(g=>GROUP_COUNTS[g.key]).map(g=>g.key));
    renderTopics(); renderPoolHint(); renderStats(); renderGarden();
    showToast('Прогресс загружен');
  }catch(e){
    showToast('Не удалось загрузить файл');
  }
}

/* ---------- SRS scheduling ----------
   Основано на исследованиях в "Запоминание слов — что работает": главное не точная
   схема интервалов, а сам факт растянутых во времени повторов (Nakata) + активное
   вспоминание вместо перечитывания (Dunlosky et al. 2013). */
const SRS_INTERVAL_DAYS = [0,1,3,7,16];
function addDaysStr(dateStr, days){
  const [y,m,dd] = dateStr.split('-').map(Number);
  const d = new Date(y, m-1, dd);
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dueOf(id){ return STATE.due[id] || null; }
function isDueToday(id){ const d = dueOf(id); return !d || d <= todayStr(); }
function scheduleAfterAnswer(id, isCorrect){
  if(isCorrect){
    const box = boxOf(id);
    STATE.due[id] = addDaysStr(todayStr(), SRS_INTERVAL_DAYS[box]);
    STATE.wrongStreaks[id] = 0;
  } else {
    STATE.due[id] = todayStr();
    STATE.wrongStreaks[id] = (STATE.wrongStreaks[id]||0)+1;
  }
}

function boxOf(id){ return STATE.boxes[id]||0; }
function setBox(id, val){ STATE.boxes[id] = Math.max(0, Math.min(4,val)); }

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function pluralDays(n){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14) return 'дней';
  if(n10===1) return 'день';
  if(n10>=2&&n10<=4) return 'дня';
  return 'дней';
}
/* Дневная цель упрощена по просьбе: не счётчик слов, а факт «сыграл хотя бы одну
   сессию сегодня» — вызывается один раз при завершении сессии (finishSession). */
function completeDailyGoalIfNeeded(){
  const today = todayStr();
  if(STATE.lastGoalDate === today) return;
  if(STATE.lastGoalDate){
    let gap = daysBetween(STATE.lastGoalDate, today) - 1;
    while(gap>0 && STATE.shields>0){ STATE.shields--; gap--; }
    STATE.dayStreak = gap>0 ? 1 : (STATE.dayStreak||0)+1;
  } else {
    STATE.dayStreak = 1;
  }
  STATE.lastGoalDate = today;
  if(STATE.dayStreak>0 && STATE.dayStreak%7===0) STATE.shields = Math.min(2, STATE.shields+1);
  saveState();
  queueToast(`Сегодняшняя серия засчитана! ${STATE.dayStreak} ${pluralDays(STATE.dayStreak)} подряд`, 'goal');
}

function levelInfo(xp){
  let lvl = 1, need = 150, total = 0;
  while(xp >= total+need){ total+=need; lvl++; need = 150 + (lvl-1)*40; }
  return { lvl, into: xp-total, need };
}

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- header stats ---------- */
function masteredCount(ids){
  ids = ids || VOCAB.map(w=>w.id);
  return ids.filter(id=>boxOf(id)>=1).length;
}
function renderStats(){
  const mastered = masteredCount();
  const streak = STATE.dayStreak||0;
  document.getElementById('statsHeroNumber').innerHTML = `
    <div class="stats-overview">
      <div class="stat-main">
        <span class="stat-main-num">${mastered}</span>
        <span class="stat-main-label"><strong>из ${VOCAB.length}</strong> слов помню</span>
      </div>
      <div class="stat-streak">
        <span class="stat-streak-num">${streak}</span>
        <span class="stat-streak-label">${streak>0? pluralDays(streak)+' подряд' : 'дней подряд'}</span>
      </div>
    </div>
  `;
}

/* ---------- setup panel ---------- */
let selectedTopics = new Set(STATE.selectedTopics || TOPIC_GROUPS.filter(g=>GROUP_COUNTS[g.key]).map(g=>g.key));
/* Режим/длина сессии/дневная норма слов больше не выбираются пользователем —
   по просьбе упрощено до одного пути: карточки, 20 слов за раз. */
const selectedMode = 'flash';
const selectedLength = 20;

/* Детерминированная раскладка карты тем: цвет и размер зависят только от id темы
   и числа слов в ней — не от Math.random(), поэтому карта не «прыгает» между рендерами. */
const BLOB_COLORS = ['var(--color-orange)','var(--color-blue)','var(--color-green)','var(--color-lilac)','var(--color-coral)','var(--color-mint)','var(--color-pink)','var(--color-yellow)'];
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i))|0; } return Math.abs(h); }
function blobColorFor(key){ return BLOB_COLORS[hashStr(key) % BLOB_COLORS.length]; }
function blobSizeFor(count, maxCount){
  const t = Math.sqrt(count) / Math.sqrt(maxCount||1);
  return Math.round(120 + t*120);
}
function renderTopics(){
  const el = document.getElementById('topics');
  const visible = TOPIC_GROUPS.filter(g=>GROUP_COUNTS[g.key]);
  const maxCount = Math.max(...visible.map(g=>GROUP_COUNTS[g.key]));
  const blobRadii = [
    '46% 54% 61% 39% / 54% 42% 58% 46%',
    '58% 42% 47% 53% / 39% 61% 43% 57%',
    '38% 62% 54% 46% / 64% 36% 58% 42%',
    '67% 33% 51% 49% / 45% 55% 40% 60%',
    '49% 51% 34% 66% / 58% 42% 65% 35%'
  ];
  const blobBackgrounds = [
    'radial-gradient(circle at 38% 32%, var(--blob-color) 0%, var(--blob-color) 40%, transparent 74%)',
    'radial-gradient(ellipse at 62% 44%, var(--blob-color) 0%, var(--blob-color) 38%, transparent 73%)',
    'radial-gradient(ellipse at 42% 34%, var(--blob-color) 0%, var(--blob-color) 36%, transparent 70%), radial-gradient(circle at 72% 64%, var(--blob-color) 0%, transparent 62%)',
    'radial-gradient(ellipse at 48% 38%, var(--blob-color) 0%, var(--blob-color) 42%, transparent 76%)',
    'radial-gradient(circle at 34% 48%, var(--blob-color) 0%, var(--blob-color) 35%, transparent 69%), radial-gradient(ellipse at 72% 42%, var(--blob-color) 0%, transparent 64%)'
  ];
  el.innerHTML = visible.map(g=>{
    const index = visible.indexOf(g);
    const on = selectedTopics.has(g.key);
    const count = GROUP_COUNTS[g.key];
    const ids = VOCAB.filter(w=>w.group===g.key && !w.isExample).map(w=>w.id);
    const learned = masteredCount(ids);
    const progress = count ? learned/count : 0;
    const size = blobSizeFor(count, maxCount);
    const color = blobColorFor(g.key);
    const finalOpacity = on ? .88 + progress*.12 : .72;
    return `<button class="topic-blob ${on?'on':''}" data-key="${g.key}" style="--blob-size:${size}px; --blob-color:${color}; --topic-progress:${progress.toFixed(3)}; --topic-final-opacity:${finalOpacity.toFixed(3)}; --topic-delay:${(index*.045).toFixed(2)}s; --topic-drift:${7+(index%4)}s; --blob-radius:${blobRadii[index%blobRadii.length]}; --blob-background:${blobBackgrounds[index%blobBackgrounds.length]}">
      <span class="topic-name">${g.label}</span>
      <span class="topic-meta">${learned} из ${count}</span>
    </button>`;
  }).join('');
  el.querySelectorAll('.topic-blob').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const k = chip.dataset.key;
      if(selectedTopics.has(k)) selectedTopics.delete(k); else selectedTopics.add(k);
      STATE.selectedTopics = Array.from(selectedTopics); saveState();
      renderTopics(); renderPoolHint();
    });
  });
}
function currentPool(){
  return VOCAB.filter(w=>selectedTopics.has(w.group) && !w.isExample);
}
function renderPoolHint(){
  const n = currentPool().length;
  document.getElementById('poolHint').textContent = n? '' : 'выбери хотя бы одну тему';
  document.getElementById('startBtn').disabled = n===0;
}

/* ---------- сад достижений ---------- */
/* Один сад вместо отдельных «коллекции» и «ачивок»: каждый цветок — это разовая
   награда за конкретное условие (счёт слов, стрик, поведение). Пока цветок не
   распустился, его вид — секрет (показываем силуэт-бутон и «?»); какой именно
   вид достанется — определено заранее детерминированно по id (не Math.random),
   просто скрыто от игрока до момента открытия. «Цена» растёт от одного
   правильного ответа до полного набора слов, попеременно чередуя счётные
   условия (сколько слов выучено) и поведенческие (серия дней, идеальная
   сессия, ночная сессия, марафон) — чтобы сад открывался и от объёма, и от
   регулярности занятий, а не только от одного показателя. */
function buildFlowerSVG(petals, color, bud){
  const cx=32, cy=36;
  if(bud){
    return `<svg viewBox="0 0 64 64"><path d="M32 20 Q40 30 32 48 Q24 30 32 20 Z" fill="${color}"/><path d="M32 48 L32 58" stroke="${color}" stroke-width="3" stroke-linecap="round"/></svg>`;
  }
  let shapes = `<path d="M32 36 L32 58" stroke="${color}" stroke-width="3" stroke-linecap="round"/>`;
  for(let i=0;i<petals;i++){
    const angle = (360/petals)*i;
    shapes += `<ellipse cx="${cx}" cy="${cy-13}" rx="6" ry="11" fill="${color}" transform="rotate(${angle} ${cx} ${cy})"/>`;
  }
  shapes += `<circle cx="${cx}" cy="${cy}" r="6" fill="var(--color-bg)"/>`;
  return `<svg viewBox="0 0 64 64">${shapes}</svg>`;
}
const FLOWER_NAMES = ['Aurora Bloom','Sunny Disc','Mindful Lotus','Focus Bell','Curious Star','Harmony Clover','Wisdom Flame','Patience Pebble','Courage Bloom','Gratitude Glow','Dreamweaver','Golden Hour','Silent Whisper','Bold Compass','Gentle Cloud','Deep Breath','Inner Light','Little Spark','Inner Garden','New Path','Morning Dew','Higher Mind','Bright Steps','Soft Landing','Clear Sky','Wild Spirit','Still Water','True North','Inner Garden','Lightness','Focus Flow','Rising Sun','Kindred Soul','Third Eye','Balance Point','Fire Within','Quiet Power','Soul Star','Magic Hour','Grateful Heart','Flowing Grace','Moonlit Path','Seed of Hope','Radiant You','Zen Garden','Infinite Calm','Joyful Heart','Open Sky','Ember Glow','Blooming Self'];
const GARDEN = FLOWER_NAMES.map((name, index)=>{
  const target = (index + 1) * 25;
  return {id:'flower'+(index+1), name, imageIndex:index, petals:6, color:'var(--color-green)', costLabel:target+' слов', desc:'Выучи '+target+' слов', cost:()=>masteredCount()>=target, progress:()=>({current:Math.min(masteredCount(),target), target, label:Math.min(masteredCount(),target)+' из '+target+' слов'})};
});
function unlockFlag(id){
  if(STATE.achievements[id]) return;
  STATE.achievements[id] = todayStr();
  saveState();
}
function gardenProgress(f){
  if(f.progress) return f.progress();
  if(/^m\d+$/.test(f.id)){
    const target = Number(f.id.slice(1));
    return {current:Math.min(masteredCount(), target), target, label:`${Math.min(masteredCount(), target)} из ${target} слов`};
  }
  if(f.id.startsWith('streak')){
    const target = Number(f.id.slice(6));
    return {current:Math.min(STATE.dayStreak||0, target), target, label:`${Math.min(STATE.dayStreak||0, target)} из ${target} дней`};
  }
  if(f.id==='sprout') return {current:Math.min(STATE.totalCorrectEver||0,1), target:1, label:`${Math.min(STATE.totalCorrectEver||0,1)} из 1 ответа`};
  const unlocked = STATE.announcedCollectibles.includes(f.id);
  return {current:unlocked?1:0, target:1, label:unlocked?'открыто':'ещё впереди'};
}
function renderGarden(justUnlocked=[]){
  document.getElementById('gardenGrid').innerHTML = GARDEN.map((f,index)=>{
    const unlocked = STATE.announcedCollectibles.includes(f.id);
    const progress = gardenProgress(f);
    const col = f.imageIndex % 10;
    const row = Math.floor(f.imageIndex / 10);
    const icon = unlocked
      ? `<div class="showcase-icon" style="--flower-x:${(col*11.111).toFixed(3)}%;--flower-y:${(row*25).toFixed(3)}%;"></div>`
      : `<div class="showcase-icon">${buildFlowerSVG(6, 'var(--color-line)', true)}</div>`;
    return `<div class="showcase-item ${unlocked?'unlocked':'locked'} ${justUnlocked.includes(f.id)?'just-unlocked':''}" title="${f.desc}">
      ${icon}
      <span class="showcase-req">${unlocked?'открыто':(index===0 ? progress.label : f.costLabel)}</span>
    </div>`;
  }).join('');
  const next = GARDEN.find(f=>!STATE.announcedCollectibles.includes(f.id));
  const nextEl = document.getElementById('gardenNext');
  if(!next){ nextEl.innerHTML = '<span>Сад полностью распустился</span>'; return; }
  const nextProgress = gardenProgress(next);
  const pct = Math.round(nextProgress.current/nextProgress.target*100);
  const remaining = nextProgress.target-nextProgress.current;
  const action = next.desc.charAt(0).toLowerCase() + next.desc.slice(1);
  nextEl.innerHTML = `<span>Чтобы расцвёл следующий цветок, ${action}</span>`;
}
function checkGarden(){
  let unlockedNew = false;
  const justUnlocked = [];
  GARDEN.forEach(f=>{
    if(!STATE.announcedCollectibles.includes(f.id) && f.cost()){
      STATE.announcedCollectibles.push(f.id);
      justUnlocked.push(f.id);
      saveState();
      queueToast(`Сад: распустился цветок «${f.name}»`, 'achv');
      unlockedNew = true;
    }
  });
  if(unlockedNew) renderGarden(justUnlocked);
}

renderTopics(); renderPoolHint(); renderStats(); renderGarden();

/* ---------- session engine ---------- */
let session = null;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
/* Настоящий SRS: сначала добираем слова, у которых подошла дата повторения
   (просроченные раньше только что подошедших), остаток сессии — новыми словами.
   Точная схема интервалов почти не важна (Nakata) — важен сам факт того, что
   повторы растянуты по датам, а не идут случайно вперемешку каждый раз. */
function buildQueue(pool, n){
  const today = todayStr();
  const due = pool.filter(w=>isDueToday(w.id));
  const notDue = pool.filter(w=>!isDueToday(w.id));
  due.sort((a,b)=>{
    const da = dueOf(a.id)||today, db = dueOf(b.id)||today;
    if(da!==db) return da<db?-1:1;
    return boxOf(a.id)-boxOf(b.id);
  });
  let queue = due.slice(0, n);
  if(queue.length < n){
    notDue.sort((a,b)=> (dueOf(a.id)||'') < (dueOf(b.id)||'') ? -1 : 1);
    queue = queue.concat(notDue.slice(0, n-queue.length));
  }
  return shuffle(queue);
}

function startSession(){
  const pool = currentPool();
  if(!pool.length) return;
  const n = selectedLength === 'весь набор' ? pool.length : selectedLength;
  const queue = buildQueue(pool, n);
  session = { queue, pool, i:0, mode:selectedMode, correct:0, wrong:0, xpStart:STATE.xp, missed:[], fullDeck:selectedLength==='весь набор' };
  document.getElementById('setup').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('session').style.display = 'flex';
  renderQuestion();
}
document.getElementById('startBtn').addEventListener('click', startSession);
document.getElementById('exitBtn').addEventListener('click', endSession);

function updateSessionProgress(){
  const pct = Math.round(session.i/session.queue.length*100);
  document.getElementById('sessProgFill').style.width = pct+'%';
}

function renderQuestion(){
  if(!session) return;
  if(session.i >= session.queue.length){ return finishSession(); }
  updateSessionProgress();
  const w = session.queue[session.i];
  const stage = document.getElementById('stage');
  stage.className = 'stage';
  const groupLabel = TOPIC_GROUPS.find(g=>g.key===w.group)?.label || '';
  if(session.mode==='flash') renderFlash(stage, w, groupLabel);
  else if(session.mode==='mc') renderMC(stage, w, groupLabel);
  else renderType(stage, w, groupLabel);
}

function afterAnswer(isCorrect, w, xpGain){
  const stage = document.getElementById('stage');
  stage.classList.add(isCorrect?'correct':'wrong');
  if(isCorrect){
    STATE.streak++; STATE.bestStreak = Math.max(STATE.bestStreak, STATE.streak);
    setBox(w.id, boxOf(w.id)+1); session.correct++;
    scheduleAfterAnswer(w.id, true);
    const before = levelInfo(STATE.xp);
    STATE.xp += xpGain;
    const after = levelInfo(STATE.xp);
    if(after.lvl>before.lvl) queueToast(`Новый уровень: ${after.lvl}`, 'gold');
    STATE.totalCorrectEver++;
    const hour = new Date().getHours();
    if(hour<5) unlockFlag('night_owl');
  } else {
    STATE.streak = 0; setBox(w.id, Math.max(0, boxOf(w.id)-1));
    scheduleAfterAnswer(w.id, false);
    session.wrong++; session.missed.push(w);
  }
  saveState(); renderStats();
  checkGarden();
  setTimeout(()=>{ session.i++; renderQuestion(); }, isCorrect?550:900);
}

/* flashcards */
function mnemonicHintHtml(w){
  const m = STATE.mnemonics[w.id];
  return m ? `<div class="mnemonic-hint">💡 ${escapeHtml(m)}</div>` : '';
}
function escapeHtml(value){
  const node = document.createElement('span');
  node.textContent = String(value);
  return node.innerHTML;
}
function contextLineHtml(w){
  if(!w.ctx) return '';
  const c = VOCAB[w.ctx];
  if(!c) return '';
  return `<div class="context-line"><span class="font-hebrew">${c.h}</span><span class="context-sep">—</span>${c.r}</div>`;
}
function mnemonicPromptHtml(w){
  if(STATE.mnemonics[w.id]) return '';
  if((STATE.wrongStreaks[w.id]||0) < 3) return '';
  return `<div class="mnemonic-prompt">
    <p>Это слово пока не запоминается — добавь свою подсказку</p>
    <div class="mnemonic-form">
      <input class="mnemonic-input" id="mnemonicInput" placeholder="например: похоже на…">
      <button class="mnemonic-save" id="mnemonicSave">Сохранить</button>
    </div>
  </div>`;
}
function attachMnemonicSave(w){
  const saveBtn = document.getElementById('mnemonicSave');
  if(!saveBtn) return;
  saveBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    const input = document.getElementById('mnemonicInput');
    const val = input.value.trim();
    if(val){ STATE.mnemonics[w.id] = val; saveState(); renderQuestion(); }
  });
}
function renderFlash(stage, w, groupLabel){
  stage.style.setProperty('--stage-color', blobColorFor(w.group));
  stage.innerHTML = `
    <span class="topic-tag">${groupLabel}</span>
    <div class="flip-zone" id="flipZone">
      <div class="hebrew-word font-hebrew" style="font-size:${hebrewFontSize(w.h)}">${w.h}</div>
      ${w.t? `<div class="translit">${w.t}</div>` : ''}
      ${mnemonicHintHtml(w)}
      <div class="card-back">
        <div class="russian-word" style="font-size:${russianFontSize(w.r)}">${w.r}</div>
        ${contextLineHtml(w)}
      </div>
      <div class="flip-hint card-front-hint">нажми, чтобы посмотреть перевод</div>
    </div>
    <div class="know-row" id="knowRow" style="display:none;">
      <button class="know-btn no" id="btnNo">Ещё учу</button>
      <button class="know-btn yes" id="btnYes">Знаю</button>
    </div>
    <div id="mnemonicWrap" style="display:none;">${mnemonicPromptHtml(w)}</div>
  `;
  const zone = document.getElementById('flipZone');
  zone.addEventListener('click', ()=>{
    zone.classList.toggle('revealed');
    const shown = zone.classList.contains('revealed');
    document.getElementById('knowRow').style.display = shown ? 'flex':'none';
    document.getElementById('mnemonicWrap').style.display = shown ? 'block':'none';
  });
  document.getElementById('btnYes').addEventListener('click', (e)=>{ e.stopPropagation(); afterAnswer(true, w, 3); });
  document.getElementById('btnNo').addEventListener('click', (e)=>{ e.stopPropagation(); afterAnswer(false, w, 0); });
  attachMnemonicSave(w);
}

/* multiple choice */
function renderMC(stage, w, groupLabel){
  const distractPool = session.pool.filter(x=>x.id!==w.id && x.r!==w.r);
  const samePool = distractPool.filter(x=>x.group===w.group);
  const src = samePool.length>=3 ? samePool : distractPool;
  const distractors = [];
  const usedIdx = new Set();
  while(distractors.length<3 && usedIdx.size<src.length){
    const idx = Math.floor(Math.random()*src.length);
    if(usedIdx.has(idx)) continue;
    usedIdx.add(idx); distractors.push(src[idx]);
  }
  const options = [...distractors, w].sort(()=>Math.random()-0.5);
  const checkMark = `<svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M4 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const crossMark = `<svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>`;
  stage.style.setProperty('--stage-color', blobColorFor(w.group));
  stage.innerHTML = `
    <span class="topic-tag">${groupLabel}</span>
    ${mnemonicHintHtml(w)}
    <div class="mc-prompt font-hebrew" style="font-size:${hebrewFontSize(w.h)}">${w.h}</div>
    <div class="mc-list" id="mcGrid">
      ${options.map(o=>`<button class="mc-opt" data-id="${o.id}"><span>${o.r}</span></button>`).join('')}
    </div>
    <div id="mcContext"></div>
  `;
  document.querySelectorAll('.mc-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mc-opt').forEach(b=>b.disabled=true);
      const isCorrect = Number(btn.dataset.id)===w.id;
      btn.classList.add(isCorrect?'correct':'wrong');
      btn.insertAdjacentHTML('beforeend', isCorrect?checkMark:crossMark);
      if(!isCorrect){
        const rightBtn = document.querySelector(`.mc-opt[data-id="${w.id}"]`);
        if(rightBtn){ rightBtn.classList.add('correct'); rightBtn.insertAdjacentHTML('beforeend', checkMark); }
      }
      document.getElementById('mcContext').innerHTML = contextLineHtml(w);
      afterAnswer(isCorrect, w, 5);
    });
  });
}

/* typing mode */
function normalizeTranslit(s){
  return s.toLowerCase()
    .replace(/ё/g,'е')
    .replace(/[^a-zа-я0-9\s]/gi,'')
    .replace(/\s+/g,' ')
    .trim();
}
function levenshtein(a,b){
  const dp = Array.from({length:a.length+1},(_,i)=>[i,...Array(b.length).fill(0)]);
  for(let j=0;j<=b.length;j++) dp[0][j]=j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++){
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  }
  return dp[a.length][b.length];
}
function renderType(stage, w, groupLabel){
  const hasTranslit = !!w.t;
  const promptText = hasTranslit ? w.r : w.h;
  const subText = hasTranslit ? 'напиши произношение на иврите (кириллицей)' : 'напиши перевод на русский';
  const promptClass = hasTranslit ? 'type-prompt' : 'type-prompt font-hebrew';
  const promptSize = hasTranslit ? russianFontSize(promptText) : hebrewFontSize(promptText);
  stage.style.setProperty('--stage-color', blobColorFor(w.group));
  stage.innerHTML = `
    <span class="topic-tag">${groupLabel}</span>
    ${mnemonicHintHtml(w)}
    <div class="${promptClass}" style="font-size:${promptSize}">${promptText}</div>
    <div class="type-sub">${subText}</div>
    <input class="type-input" id="typeInput" autocomplete="off" spellcheck="false" placeholder="${hasTranslit?'произношение…':'перевод…'}">
    <div class="type-actions">
      <button class="type-submit" id="typeSubmit">Проверить</button>
      <button class="type-reveal" id="typeReveal">Показать ответ</button>
    </div>
    <div class="reveal-answer" id="revealBox" style="display:none;"></div>
  `;
  const input = document.getElementById('typeInput');
  input.focus();
  let answered = false;
  function submit(reveal){
    if(answered) return; answered = true;
    const val = normalizeTranslit(input.value);
    const target = normalizeTranslit(hasTranslit ? w.t : w.r);
    const dist = levenshtein(val, target);
    const isCorrect = !reveal && (val===target || (target.length>4 && dist<=1));
    input.classList.add(isCorrect?'correct':'wrong');
    input.disabled = true;
    document.getElementById('revealBox').style.display = 'block';
    document.getElementById('revealBox').innerHTML = (hasTranslit
      ? `${w.h} — <b>${w.t}</b>`
      : `<span class="font-hebrew">${w.h}</span> — <b>${w.r}</b>`) + contextLineHtml(w);
    afterAnswer(isCorrect, w, 8);
  }
  document.getElementById('typeSubmit').addEventListener('click', ()=>submit(false));
  document.getElementById('typeReveal').addEventListener('click', ()=>submit(true));
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(false); });
}

/* ---------- summary ---------- */
function finishSession(){
  document.getElementById('session').style.display = 'none';
  const s = document.getElementById('summary');
  s.style.display = 'flex';
  const xpGained = STATE.xp - session.xpStart;
  const total = session.correct+session.wrong;
  const acc = total? Math.round(session.correct/total*100) : 0;
  if(session.wrong===0 && total>=10) unlockFlag('perfect_session');
  if(session.fullDeck) unlockFlag('full_deck');
  completeDailyGoalIfNeeded();
  saveState(); renderStats();
  checkGarden();
  const markR = 15, markC = 2*Math.PI*markR;
  const markColor = acc>=70 ? 'var(--good)' : 'var(--color-orange)';
  const summaryMark = `<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="${markR}" fill="none" stroke="var(--color-line)" stroke-width="2.5"/><circle cx="20" cy="20" r="${markR}" fill="none" stroke="${markColor}" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="${markC}" stroke-dashoffset="${markC-markC*acc/100}" transform="rotate(-90 20 20)"/></svg>`;
  s.innerHTML = `
    <div class="summary-mark">${summaryMark}</div>
    <p class="eyebrow">Сессия завершена</p>
    <h2>${acc}% правильно</h2>
    <div class="summary-grid">
      <div class="summary-stat"><span class="n">${session.correct}</span><span class="l">верно</span></div>
      <div class="summary-stat"><span class="n">${session.wrong}</span><span class="l">ошибок</span></div>
      <div class="summary-stat"><span class="n">+${xpGained}</span><span class="l">опыта</span></div>
      <div class="summary-stat"><span class="n">${STATE.bestStreak}</span><span class="l">лучшая серия</span></div>
    </div>
    <div class="summary-actions">
      ${session.missed.length? '<button class="btn-ghost" id="retryMissed">Повторить ошибки</button>' : ''}
      <button class="btn-primary" id="newSession">Новая сессия</button>
    </div>
  `;
  if(session.missed.length){
    document.getElementById('retryMissed').addEventListener('click', ()=>{
      const missed = session.missed;
      session = { queue: missed, pool: session.pool, i:0, mode: session.mode, correct:0, wrong:0, xpStart:STATE.xp, missed:[], fullDeck:false };
      s.style.display='none';
      document.getElementById('session').style.display='flex';
      renderQuestion();
    });
  }
  document.getElementById('newSession').addEventListener('click', endSession);
}

function endSession(){
  session = null;
  document.getElementById('session').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  renderStats(); renderPoolHint(); renderGarden();
}

/* ---------- toast queue ---------- */
let toastQueue = [];
let toastBusy = false;
function queueToast(msg, tone){
  toastQueue.push({msg, tone: tone||'gold'});
  processToastQueue();
}
function processToastQueue(){
  if(toastBusy || !toastQueue.length) return;
  toastBusy = true;
  const {msg, tone} = toastQueue.shift();
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast-tone-'+tone;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=>{ toastBusy = false; processToastQueue(); }, 400);
  }, 2200);
}
function showToast(msg){ queueToast(msg, 'gold'); }
function applyProfileUI(){
  const gate = document.getElementById('profileGate');
  const app = document.getElementById('appWrap');
  const switcher = document.getElementById('profileSwitch');
  const hasProfile = !!activeProfile;
  gate.style.display = hasProfile ? 'none' : 'grid';
  app.style.display = hasProfile ? '' : 'none';
  if(hasProfile){
    switcher.textContent = PROFILE_NAMES[activeProfile] || activeProfile;
    loadStateFromCloud();
  }
}
document.querySelectorAll('[data-profile]').forEach(button=>{
  button.addEventListener('click', ()=>{
    activeProfile = button.dataset.profile;
    localStorage.setItem('hebrewTrainer_activeProfile', activeProfile);
    location.reload();
  });
});
document.getElementById('profileSwitch').addEventListener('click', ()=>{
  activeProfile = null;
  localStorage.removeItem('hebrewTrainer_activeProfile');
  applyProfileUI();
});
applyProfileUI();
