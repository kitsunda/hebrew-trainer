<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Тренажёр иврита</title>
<meta name="description" content="Личный тренажёр иврита с интервальными повторениями">
<meta name="theme-color" content="#efe3cd">
<meta name="color-scheme" content="light">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Иврит">
<meta property="og:type" content="website">
<meta property="og:title" content="Тренажёр иврита">
<meta property="og:description" content="Личный тренажёр слов с интервальными повторениями">
<meta property="og:image" content="https://kitsunda.github.io/hebrew-trainer/icons/icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-startup-image" href="icons/launch-1125x2436.png" media="(device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1170x2532.png" media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1179x2556.png" media="(device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1206x2622.png" media="(device-width:402px) and (device-height:874px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1242x2688.png" media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1290x2796.png" media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)">
<link rel="apple-touch-startup-image" href="icons/launch-1320x2868.png" media="(device-width:440px) and (device-height:956px) and (-webkit-device-pixel-ratio:3)">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="boot-splash" id="bootSplash" aria-hidden="true">
  <span class="boot-splash-mark">א</span>
</div>

<aside class="install-hint" id="installHint" aria-live="polite" aria-label="Как установить приложение">
  <p class="install-hint-title">Открывай без браузера</p>
  <p class="install-hint-copy"><strong>Поделиться</strong> → <strong>На экран «Домой»</strong> → включить <strong>«Открывать как веб-приложение»</strong></p>
  <button class="install-hint-close" id="installHintClose" type="button">Понятно</button>
</aside>

<div id="toast"></div>

<section class="profile-gate" id="profileGate" aria-labelledby="profileTitle">
  <div class="profile-gate-inner">
    <h1 id="profileTitle">Кто играет?</h1>
    <div class="profile-choices">
      <button class="profile-choice" type="button" data-profile="nastya">Настя</button>
      <button class="profile-choice" type="button" data-profile="lenya">Лёня</button>
    </div>
  </div>
</section>

<div class="wrap" id="appWrap">
  <header class="top">
    <div>
      <h1>Тренажёр слов</h1>
    </div>
    <button class="profile-switch" id="profileSwitch" type="button" aria-label="Сменить профиль"></button>
  </header>

  <section id="setup">
    <div class="stats-hero">
      <div class="stats-top-row">
        <div id="statsHeroNumber"></div>
        <div class="start-col">
          <button class="btn-primary" id="startBtn" aria-label="Начать тренировку" title="Начать тренировку">
            <svg viewBox="0 0 72 72" aria-hidden="true">
              <g fill="currentColor" opacity=".13">
                <circle cx="36" cy="7" r="1.8"/><circle cx="47" cy="9" r="1.8"/><circle cx="56.5" cy="15.5" r="1.8"/><circle cx="63" cy="25" r="1.8"/>
                <circle cx="65" cy="36" r="1.8"/><circle cx="63" cy="47" r="1.8"/><circle cx="56.5" cy="56.5" r="1.8"/><circle cx="47" cy="63" r="1.8"/>
                <circle cx="36" cy="65" r="1.8"/><circle cx="25" cy="63" r="1.8"/><circle cx="15.5" cy="56.5" r="1.8"/><circle cx="9" cy="47" r="1.8"/>
                <circle cx="7" cy="36" r="1.8"/><circle cx="9" cy="25" r="1.8"/><circle cx="15.5" cy="15.5" r="1.8"/><circle cx="25" cy="9" r="1.8"/>
              </g>
              <g fill="currentColor" opacity=".22">
                <circle cx="36" cy="19" r="1.9"/><circle cx="44.5" cy="21.3" r="1.9"/><circle cx="50.7" cy="27.5" r="1.9"/><circle cx="53" cy="36" r="1.9"/>
                <circle cx="50.7" cy="44.5" r="1.9"/><circle cx="44.5" cy="50.7" r="1.9"/><circle cx="36" cy="53" r="1.9"/><circle cx="27.5" cy="50.7" r="1.9"/>
                <circle cx="21.3" cy="44.5" r="1.9"/><circle cx="19" cy="36" r="1.9"/><circle cx="21.3" cy="27.5" r="1.9"/><circle cx="27.5" cy="21.3" r="1.9"/>
              </g>
              <g fill="var(--color-orange)" opacity=".9">
                <circle cx="36" cy="7" r="2.2"/><circle cx="63" cy="36" r="2.2"/>
                <circle cx="36" cy="65" r="2.2"/><circle cx="9" cy="36" r="2.2"/>
              </g>
              <circle cx="36" cy="36" r="2.8" fill="currentColor"/>
            </svg>
          </button>
          <span class="hint-empty" id="poolHint"></span>
        </div>
      </div>
    </div>

    <div class="section-block garden-block">
      <p class="section-title">Сад достижений</p>
      <div class="showcase-scroll" id="gardenGrid"></div>
      <div class="garden-next" id="gardenNext"></div>
    </div>

    <div class="section-block">
      <div class="topic-map" id="topics"></div>
    </div>

  </section>

  <section id="session">
    <div class="session-top">
      <div class="session-progress"><div class="session-progress-fill" id="sessProgFill"></div></div>
      <span class="session-count" id="sessionCount"></span>
      <button class="exit-btn" id="exitBtn">Закрыть</button>
    </div>
    <div class="stage" id="stage"></div>
  </section>

  <section id="summary"></section>
</div>

<script src="bootstrap.js" defer></script>
</body>
</html>
