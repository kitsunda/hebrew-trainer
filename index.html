<meta charset="utf-8">
<title>Тренажёр иврита</title>
<style>
:root{
  --bg:#f3eee3; --surface:#ffffff; --surface-2:#fbf7ee;
  --ink:#211f26; --ink-soft:#8b8474; --line:rgba(33,31,38,.09);
  --orange:#e8763c; --orange-deep:#c85f2b; --orange-soft:#fbe2d1;
  --mint:#7fb89b; --mint-deep:#5a9a7c; --mint-soft:#dcece3;
  --gold:#f0b93e; --gold-deep:#d69f22; --gold-soft:#fbe9c2;
  --good:#5a9a7c; --bad:#d1573f;
  --shadow-sm: 0 1px 2px rgba(33,31,38,.04), 0 6px 18px -10px rgba(33,31,38,.18);
  --shadow: 0 2px 4px rgba(33,31,38,.05), 0 14px 32px -16px rgba(33,31,38,.24);
  --radius: 28px;
}
/* Тёмная тема отключена по запросу — всегда светлая, вне зависимости от системных настроек. */

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family: -apple-system,"Avenir Next","Helvetica Neue","Segoe UI",Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
.font-hebrew{font-family:"Arial Hebrew","New Peninim MT","Times New Roman","Noto Sans Hebrew",sans-serif; direction:rtl; unicode-bidi:isolate;}

.wrap{max-width:960px;margin:0 auto;padding:36px 24px 72px; position:relative;}

header.top{
  display:flex; flex-wrap:wrap; gap:20px; align-items:flex-start; justify-content:space-between;
  margin-bottom:36px; position:relative;
}
header.top .head-text{max-width:56%;}
.hero-mascot{position:absolute; right:4px; top:-30px; width:128px; height:128px;}
.hero-mascot svg{width:100%;height:100%;display:block;}
.eyebrow{
  font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft);
  font-weight:700; margin:0 0 8px;
}
h1{
  font-family:inherit;
  font-size:clamp(32px,5vw,46px); margin:0; font-weight:800; text-wrap:balance; letter-spacing:-.01em; line-height:1.05;
}
.stats-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:6px;}
.stat{display:flex; align-items:center; gap:7px; font-size:13.5px; color:var(--ink-soft); font-weight:600;
  background:var(--surface); padding:8px 14px; border-radius:99px; box-shadow:var(--shadow-sm);}
.stat b{color:var(--ink); font-weight:800; font-variant-numeric:tabular-nums;}
.level-pill{
  display:inline-flex; align-items:center; gap:9px; background:var(--surface);
  padding:6px 16px 6px 6px; border-radius:99px; font-size:13.5px; font-weight:800; color:var(--ink);
  box-shadow:var(--shadow-sm);
}
.level-pill .lv-badge{
  width:26px;height:26px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:12.5px;font-weight:800;
}
.xp-track{width:90px;height:7px;border-radius:99px;background:var(--bg); overflow:hidden;}
.xp-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .4s ease;}
.flame{color:var(--orange);}
.flame svg{display:block;}
.ring{position:relative;width:36px;height:36px;}
.ring svg{transform:rotate(-90deg);}
.ring circle{fill:none;stroke-width:4;}
.ring .track{stroke:var(--bg);}
.ring .fill{stroke:var(--gold); stroke-linecap:round; transition:stroke-dashoffset .5s ease;}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:var(--ink);}

/* SETUP PANEL */
#setup{display:flex; flex-direction:column; gap:32px;}
.panel-title{font-size:13px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink-soft); font-weight:700; margin:0 0 14px;}
.topics{display:flex; flex-wrap:wrap; gap:10px;}
.chip{
  border:none; background:var(--surface); color:var(--ink-soft);
  padding:10px 18px; border-radius:99px; font-size:13.5px; cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:8px; transition:transform .12s ease, background .15s ease; font-weight:700;
  box-shadow:var(--shadow-sm);
}
.chip:hover{transform:translateY(-1px);}
.chip .cnt{font-variant-numeric:tabular-nums; font-size:11.5px; opacity:.7; font-weight:800;}
.chip.on{background:var(--mint-soft); color:var(--ink);}
.chip.on:nth-of-type(3n+2){background:var(--orange-soft);}
.chip.on:nth-of-type(3n+3){background:var(--gold-soft);}
.chip.on .cnt{opacity:.85;}
.topics-actions{display:flex; gap:18px; margin-top:14px;}
.link-btn{background:none;border:none;color:var(--orange-deep);font-size:12.5px;font-weight:700;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:3px;}

.modes{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px;}
.mode-card{
  background:var(--surface); border:none; border-radius:var(--radius);
  padding:20px 20px 18px; cursor:pointer; transition:transform .12s ease, background .15s ease; text-align:left;
  box-shadow:var(--shadow-sm);
}
.mode-card:hover{transform:translateY(-2px);}
.mode-card.on{background:var(--gold-soft);}
.mode-card .m-icon{width:52px;height:52px; margin-bottom:10px;}
.mode-card .m-icon svg{width:100%;height:100%;display:block;}
.mode-card h3{margin:0 0 5px; font-size:17px; font-weight:800;}
.mode-card p{margin:0; font-size:12.5px; color:var(--ink-soft); line-height:1.45; font-weight:600;}

.length-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.len-btn{
  border:none; background:var(--surface); color:var(--ink);
  padding:10px 18px; border-radius:99px; font-size:13.5px; cursor:pointer; font-weight:700;
  box-shadow:var(--shadow-sm); transition:transform .12s ease;
}
.len-btn:hover{transform:translateY(-1px);}
.len-btn.on{background:var(--ink); color:var(--bg);}

.start-row{display:flex; align-items:center; gap:18px; margin-top:8px;}
.btn-primary{
  background:var(--ink); color:var(--bg); border:none;
  padding:16px 34px; border-radius:99px; font-size:16px; font-weight:800; cursor:pointer;
  box-shadow:var(--shadow); transition:transform .12s ease;
}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:.35; cursor:not-allowed; transform:none;}
.hint-empty{font-size:13px; color:var(--ink-soft); font-weight:600;}

/* SESSION */
#session{display:none; flex-direction:column; gap:22px;}
.session-top{display:flex; align-items:center; justify-content:space-between; gap:14px;}
.session-progress{flex:1; height:8px; border-radius:99px; background:var(--surface); overflow:hidden;}
.session-progress-fill{height:100%; background:var(--orange); border-radius:99px; transition:width .3s ease;}
.exit-btn{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;font-weight:700;white-space:nowrap;}
.exit-btn:hover{color:var(--orange-deep);}

.stage{
  background:var(--surface); border:none; border-radius:var(--radius);
  padding:56px 40px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:360px; position:relative; box-shadow:var(--shadow);
  transition: box-shadow .2s ease, transform .18s ease;
}
.stage.correct{box-shadow:0 0 0 3px var(--good), var(--shadow); animation:pulse .4s ease;}
.stage.wrong{box-shadow:0 0 0 3px var(--bad), var(--shadow); animation:shake .4s ease;}
@keyframes pulse{0%{transform:scale(1);}40%{transform:scale(1.015);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
@media (prefers-reduced-motion: reduce){
  .stage.correct,.stage.wrong{animation:none;}
  .card-inner{transition:none !important;}
}

.topic-tag{
  font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--ink); font-weight:800;
  background:var(--mint-soft); padding:6px 14px; border-radius:99px; margin-bottom:28px;
}

/* flashcard flip */
.flip-zone{-webkit-perspective:1400px; perspective:1400px; width:100%; max-width:520px; height:230px; cursor:pointer;}
.card-inner{position:relative; width:100%; height:100%; -webkit-transition:-webkit-transform .45s cubic-bezier(.4,.2,.2,1); transition:transform .45s cubic-bezier(.4,.2,.2,1); -webkit-transform-style:preserve-3d; transform-style:preserve-3d;}
.flip-zone.flipped .card-inner{-webkit-transform:rotateY(180deg); transform:rotateY(180deg);}
.card-face{
  position:absolute; inset:0; -webkit-backface-visibility:hidden; backface-visibility:hidden; border-radius:24px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:18px 22px; overflow:hidden;
  border:none; background:var(--mint-soft);
}
.card-face.back{-webkit-transform:rotateY(180deg); transform:rotateY(180deg); background:var(--orange-soft);}
.hebrew-word{font-weight:800; text-align:center; line-height:1.3; white-space:normal; word-break:break-word; max-width:100%;}
.translit{font-size:14px; color:var(--ink-soft); font-style:normal; text-align:center; font-weight:600;}
.russian-word{font-size:23px; font-weight:800; font-family:inherit; text-align:center; line-height:1.3; white-space:normal; word-break:break-word; max-width:100%;}
.flip-hint{font-size:11.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.07em; font-weight:700;}

.know-row{display:flex; gap:12px; margin-top:28px;}
.know-btn{
  padding:13px 24px; border-radius:99px; font-size:14.5px; font-weight:800; cursor:pointer; border:none;
  background:var(--surface-2); color:var(--ink); box-shadow:var(--shadow-sm); transition:transform .12s ease;
}
.know-btn:hover{transform:translateY(-1px);}
.know-btn.no{background:var(--orange-soft);}
.know-btn.yes{background:var(--mint-soft);}

/* multiple choice */
.mc-prompt{font-weight:800; margin-bottom:28px; text-align:center; line-height:1.3; max-width:560px;}
.mc-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:520px;}
.mc-opt{
  padding:18px 14px; border-radius:18px; border:none; background:var(--surface-2);
  font-size:15px; font-weight:700; cursor:pointer; text-align:center; transition:transform .1s ease;
  box-shadow:var(--shadow-sm);
}
.mc-opt:hover{transform:translateY(-1px);}
.mc-opt.correct{background:var(--good); color:#fff;}
.mc-opt.wrong{background:var(--bad); color:#fff;}
.mc-opt[disabled]{cursor:default;}

/* typing mode */
.type-prompt{font-size:26px; font-weight:800; margin-bottom:8px; text-align:center; font-family:inherit;}
.type-sub{font-size:12.5px; color:var(--ink-soft); margin-bottom:24px; font-weight:600;}
.type-input{
  width:100%; max-width:360px; font-size:19px; padding:15px 16px; border-radius:16px;
  border:none; background:var(--surface-2); color:var(--ink); text-align:center;
  font-family:inherit; font-weight:700;
}
.type-input:focus{outline:2px solid var(--orange); outline-offset:2px;}
.type-input.correct{background:var(--mint-soft);}
.type-input.wrong{background:var(--orange-soft);}
.type-actions{display:flex; gap:12px; margin-top:18px;}
.type-actions button{
  border:none; border-radius:99px; padding:12px 22px; font-size:13.5px; font-weight:800; cursor:pointer;
}
.type-submit{background:var(--ink); color:var(--bg); box-shadow:var(--shadow-sm);}
.type-reveal{background:none; color:var(--ink-soft); text-decoration:underline; text-underline-offset:3px; box-shadow:none;}
.reveal-answer{margin-top:16px; font-size:14px; color:var(--ink-soft); font-weight:600;}
.reveal-answer b{color:var(--ink); font-family:inherit;}

.next-hint{position:absolute; bottom:14px; right:18px; font-size:11.5px; color:var(--ink-soft);}

/* summary */
#summary{display:none; flex-direction:column; align-items:center; gap:20px; text-align:center; padding:24px 0;}
#summary .summary-mascot{width:104px;height:104px; margin-bottom:-4px;}
#summary .summary-mascot svg{width:100%;height:100%;display:block;}
#summary h2{font-family:inherit; font-size:34px; margin:0; font-weight:800;}
.summary-grid{display:flex; gap:14px; flex-wrap:wrap; justify-content:center;}
.summary-stat{display:flex; flex-direction:column; gap:2px; background:var(--mint-soft); border-radius:18px; padding:14px 20px; box-shadow:var(--shadow-sm);}
.summary-stat:nth-of-type(2){background:var(--orange-soft);}
.summary-stat:nth-of-type(3){background:var(--gold-soft);}
.summary-stat:nth-of-type(4){background:var(--mint-soft);}
.summary-stat .n{font-size:27px; font-weight:800; font-variant-numeric:tabular-nums;}
.summary-stat .l{font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; font-weight:700;}
.summary-actions{display:flex; gap:12px; margin-top:8px;}
.btn-ghost{
  background:var(--surface); border:none; color:var(--ink); padding:14px 24px;
  border-radius:99px; font-size:14px; font-weight:800; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .12s ease;
}
.btn-ghost:hover{transform:translateY(-1px);}

/* toast queue */
#toast{
  position:fixed; top:26px; left:50%; transform:translateX(-50%) translateY(-140%); z-index:50;
  padding:14px 26px; border:none; color:var(--ink);
  border-radius:99px; font-weight:800; font-size:14px; box-shadow:var(--shadow);
  transition:transform .45s cubic-bezier(.3,1.4,.4,1); display:flex; align-items:center; gap:8px;
}
#toast.toast-tone-gold{background:var(--gold);}
#toast.toast-tone-goal{background:var(--orange); color:#fff;}
#toast.toast-tone-achv{background:var(--mint);}
#toast.show{transform:translateX(-50%) translateY(0);}

canvas#fx{position:fixed; inset:0; pointer-events:none; z-index:40;}

.shield-badge{display:inline-flex; align-items:center; gap:3px; color:var(--orange-deep); font-weight:800; margin-left:8px;}

/* showcase: collection + achievements */
.showcase{display:flex; flex-direction:column; gap:28px;}
.showcase-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:12px;}
.showcase-item{
  display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
  background:var(--surface); border-radius:18px; padding:14px 8px 12px; box-shadow:var(--shadow-sm);
  transition:opacity .2s ease;
}
.showcase-item.locked{opacity:.4;}
.showcase-icon{width:46px;height:46px;}
.showcase-icon svg{width:100%;height:100%;display:block;}
.showcase-name{font-size:11px; font-weight:700; color:var(--ink); line-height:1.25;}
.showcase-item.locked .showcase-name{color:var(--ink-soft);}
.showcase-req{font-size:10px; color:var(--ink-soft); font-weight:700; font-variant-numeric:tabular-nums;}

footer.credit{margin-top:40px; font-size:11.5px; color:var(--ink-soft); text-align:center; font-weight:600;}

@media (max-width:560px){
  .mc-grid{grid-template-columns:1fr;}
  .stats-row{gap:8px;}
  .stage{padding:40px 22px;}
  .hero-mascot{width:88px;height:88px;top:-16px;}
  header.top .head-text{max-width:66%;}
}
</style>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="wobble">
    <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
  </filter>
</svg>
<canvas id="fx"></canvas>
<div id="toast"></div>

<div class="wrap">
  <header class="top">
    <div class="hero-mascot">
      <svg viewBox="0 0 140 170" xmlns="http://www.w3.org/2000/svg" style="filter:url(#wobble)">
        <path d="M48 118 Q14 128 8 165" fill="none" stroke="var(--ink)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="8" cy="166" r="7" fill="var(--gold)" stroke="var(--ink)" stroke-width="5"/>
        <path d="M92 118 Q126 128 132 165" fill="none" stroke="var(--ink)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="132" cy="166" r="7" fill="var(--gold)" stroke="var(--ink)" stroke-width="5"/>
        <ellipse cx="70" cy="128" rx="24" ry="28" fill="var(--orange)" stroke="var(--ink)" stroke-width="6"/>
        <circle cx="70" cy="62" r="52" fill="var(--mint)" stroke="var(--ink)" stroke-width="6"/>
        <path d="M46 48 L64 42" stroke="var(--ink)" stroke-width="6" stroke-linecap="round"/>
        <path d="M78 43 L96 50" stroke="var(--ink)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="56" cy="65" r="4" fill="var(--ink)"/>
        <circle cx="84" cy="65" r="4" fill="var(--ink)"/>
        <path d="M70 68 L67 84" stroke="var(--ink)" stroke-width="5" stroke-linecap="round" fill="none"/>
        <path d="M60 96 Q70 101 80 96" stroke="var(--ink)" stroke-width="5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="head-text">
      <p class="eyebrow">Иврит · журнал занятий</p>
      <h1>Тренажёр слов</h1>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </header>

  <section id="setup">
    <div>
      <p class="panel-title">Темы</p>
      <div class="topics" id="topics"></div>
      <div class="topics-actions">
        <button class="link-btn" id="selAll">выбрать все</button>
        <button class="link-btn" id="selWeak">только то, что ещё учу</button>
      </div>
    </div>

    <div>
      <p class="panel-title">Что тренировать</p>
      <div class="topics" id="kinds"></div>
    </div>

    <div>
      <p class="panel-title">Режим</p>
      <div class="modes" id="modes"></div>
    </div>

    <div>
      <p class="panel-title">Длина сессии</p>
      <div class="length-row" id="lengths"></div>
    </div>

    <div>
      <p class="panel-title">Дневная цель</p>
      <div class="length-row" id="goalRow"></div>
    </div>

    <div class="start-row">
      <button class="btn-primary" id="startBtn">Начать</button>
      <span class="hint-empty" id="poolHint"></span>
    </div>

    <div class="showcase">
      <div>
        <p class="panel-title">Коллекция</p>
        <div class="showcase-grid" id="collectionGrid"></div>
      </div>
      <div>
        <p class="panel-title">Ачивки</p>
        <div class="showcase-grid" id="achvGrid"></div>
      </div>
    </div>
  </section>

  <section id="session">
    <div class="session-top">
      <div class="session-progress"><div class="session-progress-fill" id="sessProgFill"></div></div>
      <button class="exit-btn" id="exitBtn">Закончить сессию</button>
    </div>
    <div class="stage" id="stage"></div>
  </section>

  <section id="summary"></section>

  <footer class="credit">Слова взяты из твоих домашних заданий и разборов с учительницей · прогресс сохраняется в этом браузере</footer>
</div>

function hebrewFontSize(text){
  const len = (text||'').length;
  if(len<=10) return 'clamp(30px,6vw,42px)';
  if(len<=20) return 'clamp(24px,5vw,34px)';
  if(len<=36) return 'clamp(19px,4vw,27px)';
  if(len<=60) return 'clamp(16px,3.2vw,21px)';
  return 'clamp(14px,2.6vw,18px)';
}
function russianFontSize(text){
  const len = (text||'').length;
  if(len<=14) return '22px';
  if(len<=28) return '19px';
  if(len<=50) return '16.5px';
  return '14.5px';
}
function groupOf(topic){
  const t = (topic||'').toLowerCase();
  for(const g of TOPIC_GROUPS) if(g.test && g.test(t)) return g.key;
  return 'other';
}
TOPIC_GROUPS.push({key:'other', label:'Прочее'});

VOCAB.forEach((w,i)=>{ w.id = i; w.group = groupOf(w.g); });

const GROUP_COUNTS = {};

const STORE_KEY = 'hebrewTrainer_v1';

  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { boxes:{}, xp:0, streak:0, bestStreak:0, dayStreak:0, lastDate:null, selectedTopics:null, selectedKinds:null, mode:'flash', length:20,
    dailyGoal:15, todayDate:null, todayCorrect:0, lastGoalDate:null, shields:1, achievements:{}, announcedCollectibles:[], totalCorrectEver:0 };
}

function boxOf(id){ return STATE.boxes[id]||0; }
function setBox(id, val){ STATE.boxes[id] = Math.max(0, Math.min(4,val)); }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function pluralDays(n){
  const n10=n%10, n100=n%100;
  if(n100>=11&&n100<=14) return 'дней';
  if(n10===1) return 'день';
  if(n10>=2&&n10<=4) return 'дня';
  return 'дней';
}
function resetTodayIfNeeded(){
  const t = todayStr();
  if(STATE.todayDate !== t){ STATE.todayDate = t; STATE.todayCorrect = 0; }
}

  const today = todayStr();
  if(STATE.todayCorrect < STATE.dailyGoal) return;
  if(STATE.lastGoalDate === today) return;
  if(STATE.lastGoalDate){
    let gap = daysBetween(STATE.lastGoalDate, today) - 1;
    while(gap>0 && STATE.shields>0){ STATE.shields--; gap--; }
    STATE.dayStreak = gap>0 ? 1 : (STATE.dayStreak||0)+1;
  } else {
    STATE.dayStreak = 1;
  }
  STATE.lastGoalDate = today;
  if(STATE.dayStreak>0 && STATE.dayStreak%7===0) STATE.shields = Math.min(2, STATE.shields+1);
  saveState();
  queueToast(`Дневная цель выполнена! ${STATE.dayStreak} ${pluralDays(STATE.dayStreak)} подряд`, 'goal');
  if(!reduceMotion) burstConfetti();
  checkAchievements();
}

function levelInfo(xp){
  let lvl = 1, need = 150, total = 0;
  while(xp >= total+need){ total+=need; lvl++; need = 150 + (lvl-1)*40; }
  return { lvl, into: xp-total, need };
}

/* ---------- session engine ---------- */
let session = null;

function weightedSample(pool, n){
  const weighted = pool.map(w=>({w, weight: Math.max(1, 5-boxOf(w.id))}));
  const total = weighted.reduce((s,x)=>s+x.weight,0);
  const picked = []; const used = new Set();
  const avail = weighted.slice();
  const count = Math.min(n, pool.length);
  while(picked.length<count && avail.length){
    let r = Math.random()*avail.reduce((s,x)=>s+x.weight,0);
    let idx=0;
    for(;idx<avail.length;idx++){ r-=avail[idx].weight; if(r<=0) break; }
    idx = Math.min(idx, avail.length-1);
    picked.push(avail[idx].w);
    avail.splice(idx,1);
  }
  return picked;
}

function startSession(){
  const pool = currentPool();
  if(!pool.length) return;
  const n = selectedLength === 'весь набор' ? pool.length : selectedLength;
  const queue = weightedSample(pool, n);
  resetTodayIfNeeded(); saveState();
  session = { queue, pool, i:0, mode:selectedMode, correct:0, wrong:0, xpStart:STATE.xp, missed:[], fullDeck:selectedLength==='весь набор' };
  document.getElementById('setup').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('session').style.display = 'flex';
  renderQuestion();
}
document.getElementById('startBtn').addEventListener('click', startSession);
document.getElementById('exitBtn').addEventListener('click', endSession);

function updateSessionProgress(){
  const pct = Math.round(session.i/session.queue.length*100);
  document.getElementById('sessProgFill').style.width = pct+'%';
}

function renderQuestion(){
  if(!session) return;
  if(session.i >= session.queue.length){ return finishSession(); }
  updateSessionProgress();
  const w = session.queue[session.i];
  const stage = document.getElementById('stage');
  stage.className = 'stage';
  const groupLabel = TOPIC_GROUPS.find(g=>g.key===w.group)?.label || '';
  if(session.mode==='flash') renderFlash(stage, w, groupLabel);
  else if(session.mode==='mc') renderMC(stage, w, groupLabel);
  else renderType(stage, w, groupLabel);
}

function afterAnswer(isCorrect, w, xpGain){
  const stage = document.getElementById('stage');
  stage.classList.add(isCorrect?'correct':'wrong');
  if(isCorrect){
    STATE.streak++; STATE.bestStreak = Math.max(STATE.bestStreak, STATE.streak);
    setBox(w.id, boxOf(w.id)+1); session.correct++;
    const before = levelInfo(STATE.xp);
    STATE.xp += xpGain;
    const after = levelInfo(STATE.xp);
    if(after.lvl>before.lvl) queueToast(`Новый уровень: ${after.lvl}`, 'gold');
    if(STATE.streak>0 && STATE.streak%5===0 && !reduceMotion) burstConfetti();
    resetTodayIfNeeded();
    STATE.todayCorrect++; STATE.totalCorrectEver++;
    const hour = new Date().getHours();
    if(hour<5) unlockAchievement('night_owl');
    completeDailyGoalIfNeeded();
  } else {
    STATE.streak = 0; setBox(w.id, Math.max(0, boxOf(w.id)-1));
    session.wrong++; session.missed.push(w);
  }
  saveState(); renderStats();
  checkAchievements(); checkCollectibles();
  setTimeout(()=>{ session.i++; renderQuestion(); }, isCorrect?550:900);
}

/* multiple choice */
function renderMC(stage, w, groupLabel){
  const distractPool = session.pool.filter(x=>x.id!==w.id && x.r!==w.r);
  const samePool = distractPool.filter(x=>x.group===w.group);
  const src = samePool.length>=3 ? samePool : distractPool;
  const distractors = [];
  const usedIdx = new Set();
  while(distractors.length<3 && usedIdx.size<src.length){
    const idx = Math.floor(Math.random()*src.length);
    if(usedIdx.has(idx)) continue;
    usedIdx.add(idx); distractors.push(src[idx]);
  }
  const options = [...distractors, w].sort(()=>Math.random()-0.5);
  stage.innerHTML = `
    <span class="topic-tag">${groupLabel}</span>
    <div class="mc-prompt font-hebrew" style="font-size:${hebrewFontSize(w.h)}">${w.h}</div>
    <div class="mc-grid" id="mcGrid">
      ${options.map(o=>`<button class="mc-opt" data-id="${o.id}">${o.r}</button>`).join('')}
    </div>
  `;
  document.querySelectorAll('.mc-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mc-opt').forEach(b=>b.disabled=true);
      const isCorrect = Number(btn.dataset.id)===w.id;
      btn.classList.add(isCorrect?'correct':'wrong');
      if(!isCorrect){
        const rightBtn = document.querySelector(`.mc-opt[data-id="${w.id}"]`);
        if(rightBtn) rightBtn.classList.add('correct');
      }
      afterAnswer(isCorrect, w, 5);
    });
  });
}

/* typing mode */
function normalizeTranslit(s){
  return s.toLowerCase()
    .replace(/ё/g,'е')
    .replace(/[^a-zа-я0-9\s]/gi,'')
    .replace(/\s+/g,' ')
    .trim();
}
function levenshtein(a,b){
  const dp = Array.from({length:a.length+1},(_,i)=>[i,...Array(b.length).fill(0)]);
  for(let j=0;j<=b.length;j++) dp[0][j]=j;
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++){
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  }
  return dp[a.length][b.length];
}
function renderType(stage, w, groupLabel){
  const hasTranslit = !!w.t;
  const promptText = hasTranslit ? w.r : w.h;
  const subText = hasTranslit ? 'напиши произношение на иврите (кириллицей)' : 'напиши перевод на русский';
  const promptClass = hasTranslit ? 'type-prompt' : 'type-prompt font-hebrew';
  const promptSize = hasTranslit ? russianFontSize(promptText) : hebrewFontSize(promptText);
  stage.innerHTML = `
    <span class="topic-tag">${groupLabel}</span>
    <div class="${promptClass}" style="font-size:${promptSize}">${promptText}</div>
    <div class="type-sub">${subText}</div>
    <input class="type-input" id="typeInput" autocomplete="off" spellcheck="false" placeholder="${hasTranslit?'произношение…':'перевод…'}">
    <div class="type-actions">
      <button class="type-submit" id="typeSubmit">Проверить</button>
      <button class="type-reveal" id="typeReveal">Показать ответ</button>
    </div>
    <div class="reveal-answer" id="revealBox" style="display:none;"></div>
  `;
  const input = document.getElementById('typeInput');
  input.focus();
  let answered = false;
  function submit(reveal){
    if(answered) return; answered = true;
    const val = normalizeTranslit(input.value);
    const target = normalizeTranslit(hasTranslit ? w.t : w.r);
    const dist = levenshtein(val, target);
    const isCorrect = !reveal && (val===target || (target.length>4 && dist<=1));
    input.classList.add(isCorrect?'correct':'wrong');
    input.disabled = true;
    document.getElementById('revealBox').style.display = 'block';
    document.getElementById('revealBox').innerHTML = hasTranslit
      ? `${w.h} — <b>${w.t}</b>`
      : `<span class="font-hebrew">${w.h}</span> — <b>${w.r}</b>`;
    afterAnswer(isCorrect, w, 8);
  }
  document.getElementById('typeSubmit').addEventListener('click', ()=>submit(false));
  document.getElementById('typeReveal').addEventListener('click', ()=>submit(true));
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(false); });
}

/* ---------- summary ---------- */
function finishSession(){
  document.getElementById('session').style.display = 'none';
  const s = document.getElementById('summary');
  s.style.display = 'flex';
  const xpGained = STATE.xp - session.xpStart;
  const total = session.correct+session.wrong;
  const acc = total? Math.round(session.correct/total*100) : 0;
  if(session.wrong===0 && total>=10) unlockAchievement('perfect_session');
  if(session.fullDeck) unlockAchievement('full_deck');
  checkAchievements(); checkCollectibles();
  const mascotSvg = acc>=70
    ? `<svg viewBox="0 0 40 40" style="filter:url(#wobble)"><circle cx="20" cy="20" r="16" fill="var(--mint)" stroke="var(--ink)" stroke-width="3"/><path d="M11 14 L17 11" stroke="var(--ink)" stroke-width="2.8" stroke-linecap="round"/><path d="M23 11 L29 14" stroke="var(--ink)" stroke-width="2.8" stroke-linecap="round"/><circle cx="15" cy="19" r="1.8" fill="var(--ink)"/><circle cx="25" cy="19" r="1.8" fill="var(--ink)"/><path d="M20 21 L19 27" stroke="var(--ink)" stroke-width="2.2" stroke-linecap="round"/><path d="M13 30 Q20 35 27 30" stroke="var(--ink)" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>`
    : `<svg viewBox="0 0 40 40" style="filter:url(#wobble)"><circle cx="20" cy="20" r="16" fill="var(--gold)" stroke="var(--ink)" stroke-width="3"/><path d="M11 15 L17 15" stroke="var(--ink)" stroke-width="2.8" stroke-linecap="round"/><path d="M23 15 L29 15" stroke="var(--ink)" stroke-width="2.8" stroke-linecap="round"/><circle cx="15" cy="19" r="1.8" fill="var(--ink)"/><circle cx="25" cy="19" r="1.8" fill="var(--ink)"/><path d="M20 21 L19 27" stroke="var(--ink)" stroke-width="2.2" stroke-linecap="round"/><path d="M15 31 Q20 30 25 31" stroke="var(--ink)" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>`;
  s.innerHTML = `
    <div class="summary-mascot">${mascotSvg}</div>
    <p class="eyebrow">Сессия завершена</p>
    <h2>${acc}% правильно</h2>
    <div class="summary-grid">
      <div class="summary-stat"><span class="n">${session.correct}</span><span class="l">верно</span></div>
      <div class="summary-stat"><span class="n">${session.wrong}</span><span class="l">ошибок</span></div>
      <div class="summary-stat"><span class="n">+${xpGained}</span><span class="l">опыта</span></div>
      <div class="summary-stat"><span class="n">${STATE.bestStreak}</span><span class="l">лучшая серия</span></div>
    </div>
    <div class="summary-actions">
      ${session.missed.length? '<button class="btn-ghost" id="retryMissed">Повторить ошибки</button>' : ''}
      <button class="btn-primary" id="newSession">Новая сессия</button>
    </div>
  `;
  if(session.missed.length){
    document.getElementById('retryMissed').addEventListener('click', ()=>{
      const missed = session.missed;
      session = { queue: missed, pool: session.pool, i:0, mode: session.mode, correct:0, wrong:0, xpStart:STATE.xp, missed:[], fullDeck:false };
      s.style.display='none';
      document.getElementById('session').style.display='flex';
      renderQuestion();
    });
  }
  document.getElementById('newSession').addEventListener('click', endSession);
}

function endSession(){
  session = null;
  document.getElementById('session').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  renderStats(); renderPoolHint(); renderCollection(); renderAchievements();
}

/* ---------- toast queue ---------- */
let toastQueue = [];
let toastBusy = false;
function queueToast(msg, tone){
  toastQueue.push({msg, tone: tone||'gold'});
  processToastQueue();
}
function processToastQueue(){
  if(toastBusy || !toastQueue.length) return;
  toastBusy = true;
  const {msg, tone} = toastQueue.shift();
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast-tone-'+tone;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=>{ toastBusy = false; processToastQueue(); }, 400);
  }, 2200);
}
function showToast(msg){ queueToast(msg, 'gold'); }

/* ---------- confetti ---------- */
const fx = document.getElementById('fx');
const ctx = fx.getContext('2d');
function resizeFx(){ fx.width = window.innerWidth; fx.height = window.innerHeight; }
resizeFx(); window.addEventListener('resize', resizeFx);
const palette = ['#e8763c','#7fb89b','#f0b93e'];
function burstConfetti(){
  const particles = Array.from({length:36}, ()=>({
    x: fx.width/2 + (Math.random()-0.5)*140,
    y: fx.height*0.28,
    vx: (Math.random()-0.5)*7,
    vy: -Math.random()*6-3,
    size: 4+Math.random()*4,
    color: palette[Math.floor(Math.random()*palette.length)],
    life: 60+Math.random()*20,
  }));
  let frame=0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,fx.width,fx.height);
    let alive=false;
    particles.forEach(p=>{
      if(p.life<=0) return;
      p.vy += 0.18; p.x+=p.vx; p.y+=p.vy; p.life--;
      if(p.life>0){ alive=true;
        ctx.globalAlpha = Math.min(1,p.life/30);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
      }
    });
    ctx.globalAlpha=1;
    if(alive) requestAnimationFrame(tick); else ctx.clearRect(0,0,fx.width,fx.height);
  }
  requestAnimationFrame(tick);
}
