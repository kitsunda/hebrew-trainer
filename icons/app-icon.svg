<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="soft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <radialGradient id="coral" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#f27d62" stop-opacity=".95"/>
      <stop offset=".48" stop-color="#ef9b7e" stop-opacity=".68"/>
      <stop offset="1" stop-color="#f6f0e3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="yellow" cx="45%" cy="48%" r="62%">
      <stop offset="0" stop-color="#edc242" stop-opacity=".94"/>
      <stop offset=".5" stop-color="#efd782" stop-opacity=".62"/>
      <stop offset="1" stop-color="#f6f0e3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="50%" cy="48%" r="64%">
      <stop offset="0" stop-color="#69a9c0" stop-opacity=".9"/>
      <stop offset=".5" stop-color="#9bc7d0" stop-opacity=".58"/>
      <stop offset="1" stop-color="#f6f0e3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lilac" cx="50%" cy="48%" r="64%">
