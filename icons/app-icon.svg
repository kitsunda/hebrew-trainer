    <ellipse cx="300" cy="640" rx="330" ry="245" fill="url(#yellow)" transform="rotate(18 300 640)"/>
    <ellipse cx="735" cy="505" rx="285" ry="235" fill="url(#blue)" transform="rotate(-24 735 505)"/>
    <ellipse cx="590" cy="785" rx="310" ry="220" fill="url(#lilac)" transform="rotate(-14 590 785)"/>
  </g>
  <text x="512" y="655" text-anchor="middle" font-family="Noto Serif Hebrew, Times New Roman, serif" font-size="430" font-weight="700" fill="#191713">א</text>
